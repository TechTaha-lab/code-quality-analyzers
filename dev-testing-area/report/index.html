<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Code Quality Report</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <main class="container">
    <header>
      <div>
        <p class="eyebrow">Static Analysis</p>
        <h1>Code Quality Report</h1>
      </div>
      <div id="meta" class="meta"></div>
    </header>

    <section class="cards">
      <div class="card">
        <h3>Quality Score</h3>
        <div class="score"><span id="quality-score">-</span><small>/100</small></div>
        <p id="quality-rating">-</p>
      </div>
      <div class="card">
        <h3>Files Scanned</h3>
        <div id="files-scanned">-</div>
        <p><span id="files-analyzed">-</span> analyzed</p>
      </div>
      <div class="card">
        <h3>Total Findings</h3>
        <div id="findings-count">-</div>
      </div>
      <div class="card danger">
        <h3>Errors</h3>
        <div id="errors-count">-</div>
      </div>
      <div class="card warning">
        <h3>Warnings</h3>
        <div id="warnings-count">-</div>
      </div>
    </section>

    <section class="chart-panel">
      <canvas id="severityChart" height="96"></canvas>
    </section>

    <section>
      <h2>Issues</h2>
      <ul id="issues-list"></ul>
    </section>

    <section>
      <h2>Analyzed Files</h2>
      <ul id="files-list"></ul>
    </section>
  </main>

  <script src="assets/script.js"></script>
</body>
</html>
