<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Code Quality Report</title>
  <link rel="stylesheet" href="assets/style.css" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header>
      <h1>Code Quality Report</h1>
      <div id="meta"></div>
    </header>

    <section class="cards">
      <div class="card">
        <h3>Files Scanned</h3>
        <div id="files-scanned">-</div>
      </div>
      <div class="card">
        <h3>Findings</h3>
        <div id="findings-count">-</div>
      </div>
    </section>

    <section>
      <canvas id="severityChart" height="80"></canvas>
    </section>

    <section>
      <h2>Files</h2>
      <ul id="files-list"></ul>
    </section>
  </div>

  <script src="assets/script.js"></script>
</body>
</html>
